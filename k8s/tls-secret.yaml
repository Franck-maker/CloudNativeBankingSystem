# ==========================================
# TLS Secret for Ingress (self-signed certificate)
# In production, use cert-manager with Let's Encrypt
#
# Generate with:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=banking.local/O=BankingSystem"
#   kubectl create secret tls banking-tls-secret \
#     --cert=tls.crt --key=tls.key -n banking
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: banking-tls-secret
  namespace: banking
  labels:
    app.kubernetes.io/part-of: banking-system
type: kubernetes.io/tls
# Placeholder: replace with real base64-encoded cert/key after generation
data:
  tls.crt: LS0tLS1CRUdJTi... # Replace with: cat tls.crt | base64 -w0
  tls.key: LS0tLS1CRUdJTi... # Replace with: cat tls.key | base64 -w0
