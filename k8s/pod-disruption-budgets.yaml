# ==========================================
# PodDisruptionBudgets: Ensure availability during updates
# ==========================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: banking
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: banking-backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: banking
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: banking-frontend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: banking
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
