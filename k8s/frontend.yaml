# ==========================================
# Frontend Deployment - Secured
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: banking
  labels:
    app: banking-frontend
    app.kubernetes.io/part-of: banking-system
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: banking-frontend
    spec:
      serviceAccountName: banking-frontend-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101    # nginx user
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: banking-frontend
        image: franckfozie2023/banking-frontend:v4
        ports:
        - containerPort: 8080
          protocol: TCP
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: 50Mi
      - name: nginx-cache
        emptyDir:
          sizeLimit: 50Mi
      - name: nginx-run
        emptyDir:
          sizeLimit: 10Mi

---
# ==========================================
# Frontend Service
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend-service
  namespace: banking
spec:
  type: ClusterIP
  selector:
    app: banking-frontend
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8080
