# ==========================================
# API Gateway (Kubernetes Ingress) - Secured
# TLS termination, security headers, rate limiting
# ==========================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-gateway
  namespace: banking
  annotations:
    # ---- TLS / HTTPS ----
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"

    # ---- Rate Limiting (DDoS mitigation) ----
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/limit-rpm: "300"

    # ---- Security Headers (applied via controller ConfigMap) ----
    # See security-headers.yaml for X-Frame-Options, CSP, HSTS, etc.

    # ---- Request size limit (prevent large payload attacks) ----
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # ---- Timeouts ----
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

spec:
  ingressClassName: nginx
  # ---- TLS Configuration ----
  tls:
  - hosts:
    - banking.local
    secretName: banking-tls-secret
  # ---- Routing Rules ----
  rules:
    - host: banking.local
      http:
        paths:
        # RULE 1 : Any request starting with /api goes to Spring Boot
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: banking-backend-service
              port:
                number: 8080
        # RULE 2 : Everything else (like / or /dashboard) goes to Angular
        - path: /
          pathType: Prefix
          backend:
            service:
              name: banking-frontend-service
              port:
                number: 8081