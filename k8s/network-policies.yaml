# ==========================================
# Network Policies: Zero-Trust Network Model
# Default deny all traffic, then allow only what's needed
# ==========================================

# 1. Default deny all ingress and egress in the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: banking
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# 2. Allow DNS resolution for all pods (required for service discovery)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: banking
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# 3. Frontend: Allow ingress from Ingress controller, no egress needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: banking-frontend
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic from the Ingress controller (nginx)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080

---
# 4. Backend: Allow ingress from frontend/ingress, allow egress to postgres and notification
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: banking-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from Ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow to Notification Service (gRPC)
  - to:
    - podSelector:
        matchLabels:
          app: notification-service
    ports:
    - protocol: TCP
      port: 50051

---
# 5. PostgreSQL: Only accept connections from the backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-policy
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: banking-backend
    ports:
    - protocol: TCP
      port: 5432

---
# 6. Notification Service: Only accept connections from the backend (gRPC)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-policy
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: banking-backend
    ports:
    - protocol: TCP
      port: 50051
