# ==========================================
# Kubernetes Secrets: Sensitive configuration
# In production, use a secrets manager (Vault, AWS Secrets Manager, etc.)
# Apply with: kubectl apply -f secrets.yaml
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: banking
  labels:
    app.kubernetes.io/part-of: banking-system
    app.kubernetes.io/component: database
type: Opaque
# Values are base64-encoded: echo -n 'value' | base64
# IMPORTANT: In production, use SealedSecrets or external-secrets-operator
data:
  POSTGRES_DB: YmFua2luZ19kYg==          # banking_db
  POSTGRES_USER: ZGJhZG1pbg==             # dbadmin
  POSTGRES_PASSWORD: c2VjdXJlcGFzczEyMw== # securepass123

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-credentials
  namespace: banking
  labels:
    app.kubernetes.io/part-of: banking-system
    app.kubernetes.io/component: backend
type: Opaque
data:
  DB_USER: ZGJhZG1pbg==                   # dbadmin
  DB_PASS: c2VjdXJlcGFzczEyMw==           # securepass123
