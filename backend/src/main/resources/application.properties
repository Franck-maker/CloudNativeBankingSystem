# DataSource Configuration
server.port=8082
# we use environment variables with default fallbacks for local dev vs K8s Prod
spring.datasource.url= jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:banking_db}
spring.datasource.username= ${DB_USER:dbadmin}
spring.datasource.password= ${DB_PASS:securepass123}

# JPA/Hibernate Configuration
# 'update' will automatically create/update tables based on entities, but won't drop them
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# gRPC Client Configuration for Notification Service
grpc.client.notification-service.address=static://localhost:50051
grpc.client.notification-service.negotiationType=plaintext