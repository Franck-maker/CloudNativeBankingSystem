# DataSource Configuration
# Port: 8082 for local dev, override with SERVER_PORT=8080 in K8s
server.port=${SERVER_PORT:8082}
# Context path: aligns with Ingress routing (/api/* -> backend)
server.servlet.context-path=/api
# we use environment variables with default fallbacks for local dev vs K8s Prod
spring.datasource.url= jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banking_db}
spring.datasource.username= ${DB_USER:dbadmin}
spring.datasource.password= ${DB_PASS:securepass123}

# JPA/Hibernate Configuration
# 'update' will automatically create/update tables based on entities, but won't drop them
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# gRPC Client Configuration for Notification Service
grpc.client.notification-service.address=static://${GRPC_NOTIFICATION_HOST:localhost}:${GRPC_NOTIFICATION_PORT:50051}
grpc.client.notification-service.negotiation-type=PLAINTEXT