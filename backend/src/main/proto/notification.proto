// Defines the version of the Protocol Buffers syntax being used.
// proto3 is the modern and most widely used version
syntax = "proto3"; 

// Defines the gRPC package.
//this is mainly used for namespacing the service in gRPC.
package notification;

// Options used for java code generation.
// These are especially useful when generating classes for a Spring Boot backend

//Generates multiple java files instead of a single large file.
option java_multiple_files = true;
option java_package = "com.bank.grpc.notification"; 

// Name of the outer wrapper class if a single file is generated.
option java_outer_classname = "notificationProto"; 




// 1. Service Definition
// A service defines the RPC methods that the server exposes to clients
// In this case, the Spring Boot backend will call this gRPC service.

service NotificationService {

    // RPC method used to send a transfer alert notification.
    // It takes a TransferAlertRequest as input
    // and returns a TransferAlertResponse as output.
    rpc SendTransferAlert (TransferAlertRequest) returns (TransferAlertResponse); 
}

// 2. Request Message
// This defines the structure of the data sent by the client (Spring Boot backend).
message TransferAlertRequest{
    // Unique identifier of the account involved in the transfer.
    string account_id = 1; 

    // Amount of money transferred.
    double amount = 2; 

    // Human-readable message describing the transfer alert.
    string message = 3; 
}

// 3. Response Message
// This defines the structure of the response returned by the gRPC mmicroservice.
message TransferAlertResponse{

    //Indicates whether the notification was successfully processed.
    bool success = 1; 

    // Timestamp indicating when the notification was handled.
    string timestamp = 2;

    // Additional details or status information about the operation
    string details = 3;
}